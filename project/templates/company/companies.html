{% extends 'navbar.html' %} {% block content %}

<div class="m-5 d-flex flex-column gap-4">
  <div>
    <h3>Current Companies</h3>
    <button class="btn btn-primary">
      <a class="nav-link" href="{{url_for('createCompany')}}">Add Company</a>
    </button>
  </div>
  <table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Company Name</th>
        <th scope="col">About</th>
        <th>Departments</th>
        <th>Employees</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody>
      {% for company in companies %}
      <tr>
        <th scope="row">{{company.id}}</th>
        <td>{{company.name}}</td>
        <td>{{company.about}}</td>
        <td>
          <a href="{{url_for('departments', id=company.id)}}"
            >See Departments</a
          >
        </td>
        <td>
          <a href="{{url_for('list_company_employees', id=company.id)}}"
            >Employee List</a
          >
        </td>
        <td>
          <a href="{{url_for('updateCompany', id=company.id)}}"
            ><i class="fa-regular fa-pen-to-square"></i
          ></a>
        </td>

        <td>
          <a
            href="{{url_for('deleteCompany', id=company.id)}}"
            class="hover-red"
            ><i class="fa-solid fa-x"></i
          ></a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
